<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chahid Events</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:#0b0b0b;
  color:#fff;
  scroll-behavior:smooth;
}

/* NAVBAR */
nav{
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  z-index:1000;
}
nav h2{color:gold}
nav a{
  color:#fff;
  margin-left:20px;
  text-decoration:none;
}

/* HERO VIDEO */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}
.hero video{
  width:100%;
  height:100%;
  object-fit:cover;
}
.hero .overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.hero h1{
  font-size:45px;
  color:gold;
}
.btn{
  margin-top:20px;
  padding:12px 25px;
  background:gold;
  color:#000;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
}

/* SECTIONS */
.section{
  padding:80px 20px;
  text-align:center;
}
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}
.card{
  background:#1a1a1a;
  margin:15px;
  padding:25px;
  width:250px;
  border-radius:15px;
  opacity:0;
  transform:translateY(50px);
  transition:0.6s;
}
.card.show{
  opacity:1;
  transform:translateY(0);
}
.card h3{color:gold}

/* GALLERY */
.gallery img{
  width:280px;
  margin:10px;
  border-radius:10px;
  transition:0.3s;
}
.gallery img:hover{
  transform:scale(1.05);
}

/* FOOTER */
footer{
  padding:20px;
  background:#000;
  text-align:center;
  color:#aaa;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <h2>Chahid Events</h2>
  <div>
    <a href="#services">Services</a>
    <a href="#galerie">Galerie</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO VIDEO -->
<section class="hero">
  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-wedding-toast-5174/1080p.mp4" type="video/mp4">
  </video>
  <div class="overlay">
    <h1>Chahid Events</h1>
    <p>Événements haut de gamme</p>
    <a class="btn" href="https://wa.me/212608521662">Réserver maintenant</a>
  </div>
</section>

<!-- SERVICES -->
<section id="services" class="section">
  <h2 style="color:gold">Nos Services</h2>
  <div class="cards">
    <div class="card"> <h3>Traiteur de luxe</h3><p>Service premium</p></div>
    <div class="card"> <h3>Animation DJ</h3><p>Ambiance garantie</p></div>
    <div class="card"> <h3>Éclairage</h3><p>Lumière élégante</p></div>
  </div>
</section>

<!-- GALERIE -->
<section id="galerie" class="section gallery">
  <h2 style="color:gold">Galerie</h2>
  <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622">
  <img src="https://images.unsplash.com/photo-1505238680356-667803448bb6">
  <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30">
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2 style="color:gold">Contact</h2>
  <a class="btn" href="https://wa.me/212608521662">WhatsApp</a><br>
  <a class="btn" href="https://instagram.com/chahid.events">Instagram</a><br>
  <a class="btn" href="tel:0608521662">Appeler</a>
</section>

<footer>
© 2026 Chahid Events
</footer>

<script>
const cards=document.querySelectorAll('.card');
window.addEventListener('scroll',()=>{
  cards.forEach(card=>{
    const top=card.getBoundingClientRect().top;
    if(top<window.innerHeight-50){
      card.classList.add('show');
    }
  });
});
</script>

</body>
</html>
